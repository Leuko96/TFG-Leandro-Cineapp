<div class="settings-shell">

  <section class="profile-settings card-surface">
    <div class="profile-settings__header">
      <h3>Profile settings</h3>
    </div>

    <div *ngIf="profileLoading" class="profile-settings__state">
      Cargando datos de perfil...
    </div>

    <form *ngIf="!profileLoading" class="profile-form" (ngSubmit)="saveProfileSettings()">
      <div class="profile-header">
        <div class="profile-avatar-preview">
          <img
            [src]="profilePhotoPreview"
            alt="Previsualización del avatar"
            (error)="selectedImagePreview = ''; profilePhotoUrl = ''"
          />
        </div>
        
        <div class="account-meta">
            <span class="account-label">Cuenta activa</span>
            <strong class="account-value">{{ userEmail }}</strong>
        </div>
      </div>
      <label id="field-label-image" for="profilePhotoFile">Seleccionar imagen
        <input
          id="profilePhotoFile"
          type="file"
          accept="image/*"
          (change)="onImageSelected($event)"
        />
      </label>
      <label class="field-label" for="profileDisplayName">Nombre</label>
      <input
        id="profileDisplayName"
        type="text"
        [(ngModel)]="profileDisplayName"
        name="profileDisplayName"
        placeholder="Ejemplo: Leandro"
        minlength="2"
        required
      />
       

      <div class="profile-form__actions">
        <button class="btn btn-secondary" type="submit" [disabled]="profileSaving || isWorking">
          {{ profileSaving ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>
    </form>

    <p *ngIf="profileMessage" class="profile-message">{{ profileMessage }}</p>
    <p *ngIf="profileErrorMessage" class="profile-error">{{ profileErrorMessage }}</p>
  </section>

  <section class="account-card card-surface">

    <div class="account-actions">
      <button class="btn btn-secondary" (click)="logout()" [disabled]="isWorking">
        {{ isWorking ? 'Procesando...' : 'Cerrar sesión' }}
      </button>
      <button class="btn btn-danger" (click)="openDeleteModal()" [disabled]="isWorking">
        Eliminar cuenta
      </button>
    </div>

    <p class="action-note">
      El borrado de cuenta es permanente y no se puede deshacer.
    </p>
  </section>

  <div *ngIf="errorMessage" class="settings-error card-surface">
    {{ errorMessage }}
  </div>
</div>

<div class="confirm-overlay" *ngIf="showDeleteConfirm">
  <div class="confirm-modal card-surface">
    <h3>Confirmar eliminación</h3>
    <p>
      Esta acción borrará tu cuenta. Escribe <strong>ELIMINAR</strong> para continuar.
    </p>

    <input
      type="text"
      [(ngModel)]="deletePhrase"
      name="deletePhrase"
      placeholder="Escribe ELIMINAR"
      autocomplete="off"
    />

    <div class="confirm-actions">
      <button class="btn btn-secondary" (click)="closeDeleteModal()" [disabled]="isWorking">Cancelar</button>
      <button class="btn btn-danger" (click)="deleteAccount()" [disabled]="isWorking">Confirmar borrado</button>
    </div>
  </div>
</div>
